server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: blog-backend
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.blog.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      table-prefix: t_

# JWT配置
jwt:
  secret: BlogSecretKey2024ForJwtTokenGenerationMustBeLongEnough
  expiration: 86400000
  header: Authorization
  prefix: Bearer

# 日志配置
logging:
  level:
    com.blog: debug
    com.blog.mapper: debug